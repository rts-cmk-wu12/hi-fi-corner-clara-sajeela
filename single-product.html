<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/product.css">
    <script src="js/single-product.js" defer></script>
</head>

<body>

    <div class="wrapper">

        <div class="breadcrumb">
            <a href="#">Home</a> / <a href="#">Amplifiers</a> / Marantz PM6006 UK Edition Integrated Amplifier
        </div>

        <div class="product__reklamer">
            <img class="product__visit" src="images/Hi-Fi_slider2.jpg">
        </div>
        <div class="container">
            <section class="product-section">
                <div class="left-column">
                    <div class="product-image">
                        <img src="images/amplifir.jpg" alt="Marantz PM6006 UK Edition Amplifier">
                    </div>
                    <div class="more-views">
                        <h4>MORE VIEWS</h4>
                        <div class="more__product">
                            <div>
                                <img src="images/black.jpg" alt="Amplifier Thumbnail">
                            </div>
                            <div>
                                <img src="images/amplifir.jpg" alt="Amplifier Thumbnail">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="right-column">
                    <h2 class="product__heading">Marantz PM6006 UK Edition Integrated Amplifier</h2>

                    <div class="price">
                        <div>
                            <p class="see-products"><a href="#">See other Marantz products</a></p>
                        </div>
                        <div>

                            <p class="product__price"> <span class="old-price">£469.00</span>

                                <span class="new-price">£429.00</span>
                            </p>
                        </div>

                    </div>
                    <p>The PM6006 is an upgraded successor of the multi-award-winning PM6005...</p>
                    <label for="finish">Finish</label>
                    <form>
                        <select id="finish">
                            <option value="black">Black</option>
                            <option value="silver">Silver</option>
                        </select>
                        <div class="quantity">
                            <label for="quantity">Qty:</label>
                            <input type="number" id="quantity" name="quantity" value="1" min="1">
                        </div>
                        <button class="add-to-cart">Add to Cart</button>
                        <button class="paypal-checkout">PayPal Checkout</button>
                    </form>
                </div>










            </section>







        </div>
    </div>
</body>

</html>
